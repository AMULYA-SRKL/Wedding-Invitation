<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Amulya weds Nikhil – Wedding Invitation</title>
<link href="https://fonts.googleapis.com/css2?family=Tangerine:wght@700&family=Cinzel:wght@400;600&display=swap" rel="stylesheet">
<style>
  :root {
    --gold: #e8c97a;
    --gold-dark: #8b6914;
    --bg-gradient: radial-gradient(ellipse at 50% 30%, #2a1200 0%, #0d0500 100%);
  }

  * { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color: transparent; }

  body {
    background: var(--bg-gradient);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 20px;
    font-family: 'Cinzel', serif;
    overflow: hidden; /* Prevents scroll during flips */
  }

  .title {
    font-family: 'Tangerine', cursive;
    font-size: clamp(32px, 8vw, 56px);
    color: var(--gold);
    text-shadow: 0 0 20px rgba(201, 168, 76, 0.6);
    margin-bottom: 5px;
    text-align: center;
  }

  .subtitle {
    font-size: clamp(10px, 2vw, 13px);
    color: rgba(201, 168, 76, 0.7);
    letter-spacing: 4px;
    text-transform: uppercase;
    margin-bottom: 30px;
  }

  /* === FLIPBOOK ENGINE === */
  .book-container {
    position: relative;
    width: 90vw;
    height: 60vw;
    max-width: 600px;
    max-height: 400px;
    perspective: 1500px;
  }

  .book {
    position: relative;
    width: 100%;
    height: 100%;
    transform-style: preserve-3d;
    transition: transform 0.5s;
  }

  .page {
    position: absolute;
    width: 100%;
    height: 100%;
    top: 0;
    left: 0;
    transform-style: preserve-3d;
    transform-origin: left;
    transition: transform 0.8s cubic-bezier(0.645, 0.045, 0.355, 1);
    z-index: var(--z);
  }

  /* Page Front & Back */
  .page-side {
    position: absolute;
    width: 100%;
    height: 100%;
    top: 0;
    left: 0;
    backface-visibility: hidden;
    background: #1a0f00;
    border: 3px solid transparent;
    border-image: linear-gradient(135deg, var(--gold), var(--gold-dark)) 1;
    box-shadow: inset 0 0 50px rgba(0,0,0,0.8);
    display: flex;
    justify-content: center;
    align-items: center;
    overflow: hidden;
  }

  .page-back {
    transform: rotateY(180deg);
  }

  .page img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    pointer-events: none;
  }

  /* State: Flipped */
  .page.flipped {
    transform: rotateY(-180deg);
  }

  /* === CONTROLS === */
  .controls {
    display: flex;
    align-items: center;
    gap: 20px;
    margin-top: 40px;
    z-index: 100;
  }

  .btn {
    background: linear-gradient(135deg, #2a1800, #3d2200);
    border: 1.5px solid var(--gold);
    color: var(--gold);
    padding: 10px 20px;
    cursor: pointer;
    text-transform: uppercase;
    font-family: 'Cinzel', serif;
    font-size: 12px;
    letter-spacing: 2px;
    border-radius: 2px;
  }

  .btn:disabled { opacity: 0.3; cursor: not-allowed; }

  .dots { display: flex; gap: 8px; }
  .dot {
    width: 8px;
    height: 8px;
    border-radius: 50%;
    border: 1px solid var(--gold);
    transition: 0.3s;
  }
  .dot.active { background: var(--gold); transform: scale(1.2); }

  .label {
    margin-top: 15px;
    color: var(--gold);
    font-size: 10px;
    letter-spacing: 3px;
    text-transform: uppercase;
    opacity: 0.6;
  }

  /* Mobile Landscape Fix */
  @media (max-height: 500px) {
    .title, .subtitle { display: none; }
    .book-container { height: 75vh; width: 112vh; }
  }
</style>
</head>
<body>

<div class="title">Amulya &amp; Nikhil</div>
<div class="subtitle">✦ Wedding Invitation ✦</div>

<div class="book-container" id="touchArea">
  <div class="book" id="book">
    <div class="page" style="--z: 5" id="p1">
      <div class="page-side page-front">
        <img src="data:image/jpeg;base64,...(Insert Cover Base64)..." alt="Cover">
      </div>
      <div class="page-side page-back">
        <img src="data:image/jpeg;base64,...(Insert Image 2 Base64)..." alt="Back 1">
      </div>
    </div>

    <div class="page" style="--z: 4" id="p2">
      <div class="page-side page-front">
        <img src="data:image/jpeg;base64,...(Insert Image 3 Base64)..." alt="Page 2">
      </div>
      <div class="page-side page-back">
        <img src="data:image/jpeg;base64,...(Insert Image 4 Base64)..." alt="Back 2">
      </div>
    </div>

    <div class="page" style="--z: 3" id="p3">
      <div class="page-side page-front">
        <img src="data:image/jpeg;base64,...(Insert Image 5 Base64)..." alt="Page 3">
      </div>
      <div class="page-side page-back">
        <div style="color:var(--gold); text-align:center; padding:20px;">
          <h2>Thank You</h2>
          <p style="margin-top:20px; font-size:12px;">We look forward to seeing you!</p>
        </div>
      </div>
    </div>
  </div>
</div>

<div class="label" id="pageLabel">Cover</div>

<div class="controls">
  <button class="btn" id="prevBtn" disabled>Prev</button>
  <div class="dots" id="dotContainer"></div>
  <button class="btn" id="nextBtn">Next</button>
</div>

<script>
  const pages = document.querySelectorAll('.page');
  const labels = ["Cover", "The Union", "The Celebration", "Reception", "Blessings"];
  let currentIndex = 0;
  const maxIndex = pages.length;

  // Initialize dots
  const dotContainer = document.getElementById('dotContainer');
  for(let i=0; i <= maxIndex; i++) {
    const dot = document.createElement('div');
    dot.className = `dot ${i === 0 ? 'active' : ''}`;
    dotContainer.appendChild(dot);
  }

  function updateUI() {
    document.getElementById('prevBtn').disabled = currentIndex === 0;
    document.getElementById('nextBtn').disabled = currentIndex === maxIndex;
    
    document.querySelectorAll('.dot').forEach((dot, i) => {
      dot.classList.toggle('active', i === currentIndex);
    });

    const labelIdx = Math.min(currentIndex, labels.length - 1);
    document.getElementById('pageLabel').textContent = labels[labelIdx];
  }

  function goNext() {
    if (currentIndex < maxIndex) {
      pages[currentIndex].classList.add('flipped');
      currentIndex++;
      updateUI();
    }
  }

  function goPrev() {
    if (currentIndex > 0) {
      currentIndex--;
      pages[currentIndex].classList.remove('flipped');
      updateUI();
    }
  }

  // Click listeners
  document.getElementById('nextBtn').addEventListener('click', goNext);
  document.getElementById('prevBtn').addEventListener('click', goPrev);

  // Touch/Swipe Logic
  let touchStartX = 0;
  const area = document.getElementById('touchArea');

  area.addEventListener('touchstart', e => {
    touchStartX = e.touches[0].clientX;
  }, {passive: true});

  area.addEventListener('touchend', e => {
    const touchEndX = e.changedTouches[0].clientX;
    const diff = touchStartX - touchEndX;

    if (Math.abs(diff) > 50) { // Threshold
      if (diff > 0) goNext();
      else goPrev();
    }
  }, {passive: true});

  // Keyboard
  document.addEventListener('keydown', e => {
    if (e.key === 'ArrowRight') goNext();
    if (e.key === 'ArrowLeft') goPrev();
  });
</script>
</body>
</html>
