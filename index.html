<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Amulya & Nikhil Wedding</title>
<link href="https://fonts.googleapis.com/css2?family=Tangerine:wght@700&family=Cinzel:wght@400;600&display=swap" rel="stylesheet">
<style>
  :root {
    --gold: #e8c97a;
    --paper: #1a0f00;
  }

  * { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color: transparent; }

  body {
    background: radial-gradient(ellipse at 50% 30%, #2a1200 0%, #0d0500 100%);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 20px;
    font-family: 'Cinzel', serif;
    overflow: hidden;
  }

  .header { text-align: center; margin-bottom: 30px; }
  .title { font-family: 'Tangerine', cursive; font-size: 3rem; color: var(--gold); margin: 0; }
  .subtitle { font-size: 0.7rem; color: var(--gold); letter-spacing: 4px; opacity: 0.8; }

  .book-container {
    position: relative;
    width: 90vw;
    height: 125vw;
    max-width: 400px;
    max-height: 560px;
    perspective: 1500px;
  }

  .book {
    position: relative;
    width: 100%;
    height: 100%;
    transform-style: preserve-3d;
  }

  .page {
    position: absolute;
    width: 100%;
    height: 100%;
    top: 0;
    left: 0;
    transform-style: preserve-3d;
    transform-origin: left;
    transition: transform 0.8s cubic-bezier(0.645, 0.045, 0.355, 1);
    z-index: var(--z);
  }

  .page-side {
    position: absolute;
    width: 100%;
    height: 100%;
    backface-visibility: hidden;
    background: var(--paper);
    border: 3px solid var(--gold);
    box-shadow: inset 0 0 50px rgba(0,0,0,0.8);
    overflow: hidden;
  }

  .page-back { transform: rotateY(180deg); }

  img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    display: block;
  }

  .page.flipped { transform: rotateY(-180deg); }

  .controls {
    margin-top: 30px;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 15px;
  }

  .nav-btns { display: flex; gap: 20px; align-items: center; }
  
  .btn {
    background: none;
    border: 1px solid var(--gold);
    color: var(--gold);
    padding: 8px 20px;
    cursor: pointer;
    font-family: 'Cinzel';
    text-transform: uppercase;
    font-size: 12px;
  }

  .btn:disabled { opacity: 0.3; }

  .dots { display: flex; gap: 8px; }
  .dot {
    width: 6px;
    height: 6px;
    border-radius: 50%;
    background: rgba(232, 201, 122, 0.3);
  }
  .dot.active { background: var(--gold); transform: scale(1.3); }

  .hint { color: var(--gold); font-size: 10px; opacity: 0.5; letter-spacing: 2px; margin-top: 5px; }
</style>
</head>

<div class="controls">
  <div class="nav-btns">
    <button class="btn" id="prevBtn" disabled>Prev</button>
    <div class="dots" id="dotContainer"></div>
    <button class="btn" id="nextBtn">Next</button>
  </div>
  <p class="hint">SWIPE OR CLICK TO FLIP</p>
</div>

<script>
  const pages = document.querySelectorAll('.page');
  const dotContainer = document.getElementById('dotContainer');
  let currentIdx = 0;
  const totalPages = pages.length;

  // Create Navigation Dots
  for (let i = 0; i <= totalPages; i++) {
    const dot = document.createElement('div');
    dot.className = i === 0 ? 'dot active' : 'dot';
    dotContainer.appendChild(dot);
  }

  function updateUI() {
    document.getElementById('prevBtn').disabled = currentIdx === 0;
    document.getElementById('nextBtn').disabled = currentIdx === totalPages;
    
    document.querySelectorAll('.dot').forEach((dot, i) => {
      dot.classList.toggle('active', i === currentIdx);
    });
  }

  function flipNext() {
    if (currentIdx < totalPages) {
      pages[currentIdx].classList.add('flipped');
      currentIdx++;
      updateUI();
    }
  }

  function flipPrev() {
    if (currentIdx > 0) {
      currentIdx--;
      pages[currentIdx].classList.remove('flipped');
      updateUI();
    }
  }

  // Button Listeners
  document.getElementById('nextBtn').onclick = flipNext;
  document.getElementById('prevBtn').onclick = flipPrev;

  // Swipe logic for mobile
  let startX = 0;
  const area = document.getElementById('bookArea');

  area.addEventListener('touchstart', e => startX = e.touches[0].clientX, {passive: true});
  area.addEventListener('touchend', e => {
    const endX = e.changedTouches[0].clientX;
    const diff = startX - endX;
    if (Math.abs(diff) > 50) {
      if (diff > 0) flipNext();
      else flipPrev();
    }
  }, {passive: true});
</script>
